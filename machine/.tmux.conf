# Prefix
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Start windows at 1
set -g base-index 1
setw -g pane-base-index 1

# Cap scrollback — prevents memory bloat with many agent sessions
set -g history-limit 5000

# Auto-kill session when last client detaches (prevents zombie sessions from cmd+w)
set -g destroy-unattached on

# Mouse support
set -g mouse on

# Clipboard
set -s allow-passthrough on
set -s set-clipboard on

# True color
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# cmd+t (via ghostty) = new window
bind c new-window -c "#{pane_current_path}"

# cmd+w (via ghostty) = close pane
bind x kill-pane

# cmd+1-6 (via ghostty) = switch window
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind 6 select-window -t 6
